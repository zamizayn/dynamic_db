services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: dynamic_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      API_KEY: ${API_KEY:-change_me_in_production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change_me_to_a_random_secret_32}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: dynamic_db
      DB_USER: postgres
      DB_PASS: root
      TRUST_PROXY: "true"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
